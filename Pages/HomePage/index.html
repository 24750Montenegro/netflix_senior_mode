<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <div class="nav" id="navbar"></div>

  <!-- Banner / Header -->
  <div class="banner">
    <div class="bg-overlay"></div>
    <!-- Crédito de video: "Saw 'Jigsaw Killer' Scene" por SAWCentral -->
    <video id="background-video" autoplay loop muted poster="../../images/HomePage/Header/SAW.jpeg">
      <source src="../../images/HomePage/Header/Saw 'Jigsaw Killer' Scene.mp4" type="video/mp4">
    </video>
    <div class="banner__contents">
      <img src="../../images/HomePage/Header/Saw_logo.png" class="banner__title" alt="SAW">
      <div class="banner__description">
        Un hombre llamado Adam se encuentra encadenado a una tubería oxidada, y su angustiante desafío implica un acertijo que lo llevará a la libertad o a la muerte.
      </div>
      <div class="banner__buttons">
        <button class="banner__button play">
          <img class="icon" src="../../images/HomePage/Header/play.svg" alt="">Reproducir
        </button>
        <button class="banner__button info">
          <img class="icon" src="../../images/HomePage/Header/info.svg" alt="">Más información
        </button>
      </div>
    </div>
  </div>

  <!-- Top 10 -->
  <div class="row">
    <h2>Argentina: top 10 en películas hoy</h2>
    <div class="row_posters-10" id="top10"></div>
  </div>

  <!-- Películas recientes -->
  <div class="row">
    <h2>Películas estrenadas recientemente</h2>
    <div class="row_posters" id="posters-peliculas"></div>
  </div>

  <!-- Series recientes -->
  <div class="row">
    <h2>Series estrenadas recientemente</h2>
    <div class="row_posters" id="posters-series"></div>
  </div>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <script>
    window.BASE_PATH = '../../';
  </script>
  <script src="../../js/csvParser.js"></script>
  <script src="../../js/components.js"></script>
  <script>
    // Imágenes del Top 10 (hardcodeadas ya que son las del banner principal)
    const top10Imgs = [
      '../../images/HomePage/Body/Top10/large-movie1.jpg',
      '../../images/HomePage/Body/Top10/large-movie2.jpg',
      '../../images/HomePage/Body/Top10/large-movie3.jpg',
      '../../images/HomePage/Body/Top10/large-movie4.jpg',
      '../../images/HomePage/Body/Top10/large-movie5.jpg',
      '../../images/HomePage/Body/Top10/large-movie6.jpg',
      '../../images/HomePage/Body/Top10/large-movie7.jpg',
      '../../images/HomePage/Body/Top10/large-movie8.jpg',
      '../../images/HomePage/Body/Top10/large-movie1.jpg',
      '../../images/HomePage/Body/Top10/large-movie2.jpg',
    ];

    // Índices de películas a mostrar en los posters del home (de peliculas.csv)
    const indicesPeliculas = [0, 1, 2, 3, 4, 5, 6, 7, 0, 1];
    // Índices de series a mostrar en los posters del home (de series.csv)
    const indicesSeries    = [0, 1, 2, 3, 5, 6, 7, 10, 0, 1];

    document.getElementById('navbar').innerHTML = navbarHTML('Inicio');
    document.getElementById('footer').innerHTML = footerHTML();

    document.getElementById('top10').innerHTML = top10Imgs
      .map((src, i) => `
        <div class="item">
          <div class="number">${i + 1}</div>
          <div><img src="${src}" class="row__posterLarge" alt="Top ${i + 1}"></div>
        </div>`)
      .join('');

    Promise.all([
      loadCSV('../../data/peliculas.csv'),
      loadCSV('../../data/series.csv'),
    ]).then(([peliculas, series]) => {
      document.getElementById('posters-peliculas').innerHTML =
        indicesPeliculas.map(i => posterPeliculaHTML(peliculas[i])).join('');
      document.getElementById('posters-series').innerHTML =
        indicesSeries.map(i => posterSerieHTML(series[i])).join('');
    }).catch(err => console.error('Error cargando datos:', err));
  </script>

</body>
</html>
