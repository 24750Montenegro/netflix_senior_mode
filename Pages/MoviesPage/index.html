<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix — Películas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="nav" id="navbar"></div>

  <section>
    <h1>Películas</h1>
    <div class="grid" id="grid-peliculas"></div>
  </section>

  <footer class="footer" id="footer"></footer>

  <script>
    window.BASE_PATH = '../../';
  </script>
  <script src="../../js/csvParser.js"></script>
  <script src="../../js/components.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = navbarHTML('Películas');
    document.getElementById('footer').innerHTML = footerHTML();

    loadCSV('../../data/peliculas.csv').then(peliculas => {
      document.getElementById('grid-peliculas').innerHTML =
        peliculas.map(p => tarjetaPeliculaHTML(p)).join('');
    }).catch(err => console.error('Error cargando películas:', err));
  </script>

</body>
</html>
