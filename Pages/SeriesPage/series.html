<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix — Series</title>
  <link rel="stylesheet" href="series.css">
  <link rel="stylesheet" href="resetcss.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="nav" id="navbar"></div>

  <div class="conteudo">
    <div class="titulo">
      <h1 class="titulo">Series</h1>
      <a class="showall" href="series.html">Ver todo ›</a>
    </div>

    <!-- Las series se renderizan en grupos de 4 -->
    <div id="grilla-series"></div>
  </div>

  <footer class="footer" id="footer"></footer>

  <script>
    window.BASE_PATH = '../../';
  </script>
  <script src="../../js/csvParser.js"></script>
  <script src="../../js/components.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = navbarHTML('Series');
    document.getElementById('footer').innerHTML = footerHTML();

    loadCSV('../../data/series.csv').then(series => {
      // Agrupa las series en filas de 4
      const grupoSize = 4;
      let html = '';
      for (let i = 0; i < series.length; i += grupoSize) {
        const grupo = series.slice(i, i + grupoSize);
        html += `<div class="sessão1">${grupo.map(s => tarjetaSerieHTML(s)).join('')}</div>`;
      }
      document.getElementById('grilla-series').innerHTML = html;
    }).catch(err => console.error('Error cargando series:', err));
  </script>

</body>
</html>
